<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiet san pham</title>
    <link rel="stylesheet" href="./style/detail.css">
</head>
<body>

    <div class="navbar">
    <div class="container navbar-inner">
      <a href="./home.html"><div class="logo">LaptopStore</div></a>

      <div class="search">
        <input type="text" placeholder="Tìm sản phẩm">
        <button>Tìm</button>
      </div>

      <div class="cart">
        🛒<br><a href="./shopping-cart.html">Giỏ Hàng</a>
      </div>
    </div>
  </div>

    <div class="detail-page">
        <section class="detail-card">
            <div class="detail-image-wrap">
                <img data-product-image src="./assets/home/vanphong/lenovo_thinkbook.jpg" alt="San pham">
            </div>

            <div class="detail-content">
                <p class="detail-category">Chi Tiết Sản Phẩm</p>
                <h1 data-product-name>Sản Phẩm</h1>
                <p class="detail-price" data-product-price>Liên Hệ: 0123456789</p>

                <p class="detail-description" data-product-description>
                    Đây là một sản phẩm chất lượng cao.
                </p>

                <div class="detail-actions">
                    <a id="add-to-cart" class="add-btn" href="./shopping-cart.html">Thêm vào giỏ hàng</a>
                    <a class="view-btn" href="./home.html">Xem thêm sản phẩm khác</a>
                </div>
            </div>
        </section>
    </div>


    <div class="footer">
    <div class="container footer-inner">
      <div>
        <h3>LaptopStore</h3>
        <p>Địa chỉ: 123 Đường ABC, Quận XYZ, TP.HCM</p>
        <img src="./assets/home/bct.png" alt="">
      </div>

      <div>
        <h3>Liên hệ</h3>
        <p>Hotline: 0123456789</p>
      </div>
    </div>

    </div>

    <script src="./script/detail.js"></script>
</body>
</html>
