<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="./style/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
</head>

<body>
    <div class="vh-100 d-flex justify-content-center align-items-center">
        <div class="card shadow p-5" style="width: 450px;">
            <h1 class="mb-3 text-center">Login</h1>
            <input id="username" class="form-control mb-3" type="text" placeholder="Username">
            <input id="password" class="form-control mb-3" type="password" placeholder="Password">
            <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" value="" id="flexCheckDefault">
                <label class="form-check-label" for="flexCheckDefault">
                    Save login
                </label>
            </div>
            <button id="btn-login" class="btn btn-danger mb-3">Login</button>
            <a class="text-danger text-center fw-bolder text-decoration-none" href="./register.html">Create a new account</a>
        </div>
    </div>
</body>
<script src="./script/login.js"></script>

</html>
